name: ルアーHTML記事を自動生成
run-name: ${{ inputs.product_name }} のHTML記事を生成

'on':
  workflow_dispatch:
    inputs:
      product_name:
        description: 商品名・ルアー名
        required: true
        type: string
      official_product_url:
        description: 公式商品ページURL
        required: true
        type: string
      article_slug:
        description: 保存用スラッグ（半角英数字とハイフン）
        required: true
        type: string
      keyword:
        description: SEOキーワード（空欄なら商品名＋インプレ）
        required: false
        type: string
        default: ''
      related_keywords:
        description: 関連キーワード
        required: false
        type: string
        default: ''
      search_intent:
        description: 検索意図
        required: false
        type: string
        default: ''
      persona:
        description: 想定読者・ペルソナ
        required: false
        type: string
        default: ''
      article_title:
        description: 記事タイトル
        required: false
        type: string
        default: ''
      benchmark:
        description: 参考にしたい競合URL・記事名
        required: false
        type: string
        default: ''
      target_char_count:
        description: 目標文字数
        required: false
        type: string
        default: '5000'
      extra_notes:
        description: 追加指示
        required: false
        type: string
        default: ''
      create_pull_request:
        description: Pull Requestを作成する
        required: true
        type: boolean
        default: true

concurrency:
  group: codex-lure-html-article-${{ inputs.article_slug }}
  cancel-in-progress: false

jobs:
  generate:
    name: 調査・執筆・検査
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      PRODUCT_NAME: ${{ inputs.product_name }}
      OFFICIAL_URL: ${{ inputs.official_product_url }}
      ARTICLE_SLUG: ${{ inputs.article_slug }}
      KEYWORD: ${{ inputs.keyword }}
      RELATED_KEYWORDS: ${{ inputs.related_keywords }}
      SEARCH_INTENT: ${{ inputs.search_intent }}
      PERSONA: ${{ inputs.persona }}
      ARTICLE_TITLE: ${{ inputs.article_title }}
      BENCHMARK: ${{ inputs.benchmark }}
      TARGET_CHAR_COUNT: ${{ inputs.target_char_count }}
      EXTRA_NOTES: ${{ inputs.extra_notes }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 入力値を検査してCodex用プロンプトを作成
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .codex-runtime generated

          python - <<'PY'
          import datetime as dt
          import os
          import pathlib
          import re
          import textwrap
          import urllib.parse

          product = os.environ["PRODUCT_NAME"].strip()
          official_url = os.environ["OFFICIAL_URL"].strip()
          slug = os.environ["ARTICLE_SLUG"].strip()
          keyword = os.environ.get("KEYWORD", "").strip() or f"{product} インプレ"
          related_keywords = os.environ.get("RELATED_KEYWORDS", "").strip()
          search_intent = os.environ.get("SEARCH_INTENT", "").strip() or f"{product}の良い点・悪い点・使い方・スペックを知り、購入するか判断したい"
          persona = os.environ.get("PERSONA", "").strip() or "シーバス用ルアーの購入で迷っている初心者〜中級者"
          article_title = os.environ.get("ARTICLE_TITLE", "").strip() or f"{product}のインプレを徹底解説！良かった点・悪かった点・使い方まとめ"
          benchmark = os.environ.get("BENCHMARK", "").strip() or "検索上位の競合記事を参考にする"
          target_char_count = os.environ.get("TARGET_CHAR_COUNT", "").strip() or "5000"
          extra_notes = os.environ.get("EXTRA_NOTES", "").strip()

          if not product or len(product) > 120 or "\n" in product or "\r" in product:
              raise SystemExit("product_name は1行・120文字以内で入力してください。")

          if not re.fullmatch(r"[a-z0-9][a-z0-9-]{0,63}", slug):
              raise SystemExit("article_slug は半角英小文字・数字・ハイフンのみ、64文字以内で入力してください。")

          parsed = urllib.parse.urlparse(official_url)
          if parsed.scheme not in {"http", "https"} or not parsed.netloc:
              raise SystemExit("official_product_url には有効な http/https URLを入力してください。")

          for name, value, limit in [
              ("keyword", keyword, 200),
              ("related_keywords", related_keywords, 1000),
              ("search_intent", search_intent, 1000),
              ("persona", persona, 1000),
              ("article_title", article_title, 200),
              ("benchmark", benchmark, 2000),
              ("target_char_count", target_char_count, 20),
              ("extra_notes", extra_notes, 2000),
          ]:
              if len(value) > limit:
                  raise SystemExit(f"{name} は{limit}文字以内で入力してください。")

          if not re.fullmatch(r"[0-9,０-９，]+", target_char_count):
              raise SystemExit("target_char_count は数字で入力してください。例: 5000")

          today = dt.date.today().isoformat()
          notes = extra_notes if extra_notes else "特になし"
          related = related_keywords if related_keywords else "商品名、インプレ、良かった点、悪かった点、使い方、スペック、カラー"
          default_heading_structure = f"""
          導入文

          <h2>{product}とは？基本スペック</h2>
          <h3>{product}のカラーラインナップ</h3>

          <h2>{product}のインプレ：良かった点</h2>

          <h2>{product}のインプレ：悪かった点</h2>

          <h2>{product}の使い方</h2>

          <h2>{product}のインプレまとめ</h2>
          """.strip()

          prompt = f"""
          あなたは上場企業に勤める敏腕SEOライターです。
          釣りジャンルの記事を、読者の購入判断に役立つように作成してください。
          次の商品についてWeb調査を行い、WordPressブロックエディタへそのまま貼れるHTML本文だけを返してください。

          【変数】
          - キーワード: {keyword}
          - 関連キーワード: {related}
          - 検索意図: {search_intent}
          - ペルソナ: {persona}
          - 記事タイトル: {article_title}
          - ベンチマーク: {benchmark}
          - 文字数: {target_char_count}字前後
          - 商品名: {product}
          - 公式商品ページ: {official_url}
          - 調査日: {today}
          - 追加指示: {notes}

          【ゴール】
          指定された見出し構成に沿って、読者の悩みを解決し、検索エンジンで上位表示を狙うSEO最適化されたブログ記事の本文を作成してください。
          比較やスペック整理が必要な箇所では、正確な<table>タグを使って情報を整理してください。
          {keyword}で上位表示している記事は検索エンジンから評価されているコンテンツなので、必ず競合サイトを調査して参考にしてください。

          【最優先の事実確認ルール】
          1. 公式商品ページを、スペック・特徴・カラーの一次情報として最優先してください。
          2. 良い点・悪い点・使い方は、メーカー情報だけで断定せず、独立したレビュー、釣具店の記事、実釣記事、動画の説明文など複数ソースで照合してください。
          3. 検索結果のスニペットだけを根拠にせず、可能な限り元ページを確認してください。
          4. 確認できない数値、カラー、使用感、釣果、価格、飛距離は推測で補わないでください。
          5. 自分で実釣したような架空の一人称体験は書かず、「公式では」「レビューでは」「使用者からは」のように情報源を区別してください。
          6. ハルシネーションは厳禁です。確認できない内容は確認できないと自然に書いてください。

          【絶対に守る出力ルール】
          - 出力はHTML本文のみです。前置き、作業報告、TODO、Markdown、コードフェンスは出力しないでください。
          - 本文中に [1]、[2]、[1][3] のようなサイテーション番号を絶対に入れないでください。
          - 参考資料、出典一覧、URL一覧は出力しないでください。
          - <h2>、<h3>、<p>、<ul>、<li>、<table>、<tbody>、<tr>、<td>、<strong>、<br>のみを中心に使ってください。
          - 段落には必ず<p>タグを使ってください。
          - 見出しは<h2>、小見出しは<h3>タグを使ってください。
          - Markdownの##、###、|表|、箇条書き記号だけの出力は禁止です。
          - WordPressに貼り付ける記事本文なので、全体を<html>、<body>で囲まないでください。
          - 記事の最後だけに「<p>文字数：0000字</p>」の形式で文字数を入れてください。

          【文章方針】
          - ですます調で書いてください。
          - 常に{persona}目線で書いてください。
          - 同じ語尾を3回連続させないでください。
          - 1文は日本語で40〜100文字以内を目安にしてください。
          - 導入文とまとめの段落は300文字以上400文字以下にしてください。
          - 主語と述語は近づけ、文章はシンプルにしてください。
          - 本文に必ず改行を入れて段落を分け、詰まった文字列にしないでください。
          - 15歳の日本人が容易に理解できる自然で論理的な日本語にしてください。
          - 箇条書きは1項目20文字以内を目安にしてください。
          - 情報がリスト形式、順序、指示の場合は<ul><li>で要点だけを整理してください。
          - 難しい専門用語は避け、必要な場合はやさしく説明してください。
          - 順接・並列の接続詞を多用しないでください。
          - 指示代名詞を多用しないでください。
          - 文章の重複や冗長な水増しを避けてください。
          - PASONAの流れを意識し、悩み、失敗回避、解決策、向く人、行動判断につながる構成にしてください。
          - 商標名、事業者名、商品名は言い換えないでください。

          【納品ルール】
          - WordPressブロックエディタで正しく見出しや段落を識別できる形式にしてください。
          - サービスや商品の説明が必要なH3見出し内には、必要に応じて<table>タグを用いた表を挿入してください。
          - 比較が必要なH3見出しの直後には、必ず<table>タグを用いた比較表を挿入してください。
          - 比較が不要なH3見出しには表を入れないでください。
          - 比較表やスペック表の情報は正確に記述し、誤情報を含めないでください。
          - SEOに適した見出し・本文構成を維持してください。

          【見出し構成】
          {default_heading_structure}

          【導入文】
          記事の冒頭は、空行を除いて必ず4つの<p>タグで構成してください。H1見出しは付けません。
          1つ目の<p>: 「特徴・評価」と噂の「全長mm（またはcm）」「重量g」の「{product}」
            - 例: <p>引き抵抗が軽いと噂の70mm・13gの「{product}」</p>
            - 体言止めにし、句点を付けず、末尾を必ず「{product}」にしてください。
            - 全長と重量は公式情報で確認できた値だけを使ってください。
          2つ目の<p>: 「悪いインプレまたは評判を1つだけ」という評判は本当なのでしょうか？
            - かぎ括弧内には悪い評判を1つだけ入れてください。
          3つ目の<p>: この記事では「{product}」の良かった・悪かったインプレを徹底解説します。
          4つ目の<p>: 「{product}」を購入しようか迷っている人の参考になれば幸いです。

          【本文構成の詳細】
          <h2>{product}とは？基本スペック</h2>
          - 公式ページの情報だけを使い、<table class="wp-block-table"><tbody>形式のスペック表を作成してください。
          - 全長、重量、タイプ、レンジ、アクション、フック、リングなど、公式に掲載された項目を記載してください。
          - 公式にない項目を推測で埋めないでください。
          - 表の下に、公式ページの商品説明をそのまま長く転載せず、意味を保った自然な文章に要約してください。

          <h3>{product}のカラーラインナップ</h3>
          - 公式商品ページに掲載されているカラー名を、掲載順を尊重して<ul><li>で書いてください。
          - 色名を画像だけから推測しないでください。
          - リストの直後に、カラー選びの考え方を約100文字で説明してください。

          <h2>{product}のインプレ：良かった点</h2>
          - セクション冒頭に、後続H3の要点を3〜6個の<ul><li>で総括してください。
          - リスト直後に、全体像を100〜180文字程度で簡潔に解説してください。
          - 根拠のある良いインプレごとに<h3>を作成してください。
          - 各H3本文は日本語でおおむね200〜300文字にしてください。
          - 状況、理由、向く場面まで具体的に説明してください。

          <h2>{product}のインプレ：悪かった点</h2>
          - セクション冒頭に、後続H3の要点を2〜5個の<ul><li>で総括してください。
          - リスト直後に、購入前に知るべき注意点を100〜180文字程度で簡潔に解説してください。
          - 根拠のある悪いインプレごとに<h3>を作成してください。
          - 各H3本文は日本語でおおむね200〜300文字にしてください。
          - 弱点が出やすい条件、回避策、代替案まで説明してください。

          <h2>{product}の使い方</h2>
          - セクション冒頭に、後続H3の使い方を3〜6個の<ul><li>で総括してください。
          - リスト直後に、基本操作と使い分けを100〜180文字程度で簡潔に解説してください。
          - ただ巻き、リフト＆フォール、ジャーク、ストラクチャー攻略など、商品特性と根拠に合う方法だけを<h3>にしてください。
          - 各H3本文は日本語でおおむね200〜300文字にしてください。
          - 操作、速度、レンジ、適した状況、注意点を具体的に説明してください。

          <h2>{product}のインプレまとめ</h2>
          - 良い点、悪い点、向いている人、慎重に選ぶべき人を整理してください。
          - 購入判断につながる結論を300〜400文字程度でまとめてください。
          - 誇張した断定や根拠のない「絶対に釣れる」などの表現は禁止です。
          - 参考資料や出典一覧は出力しないでください。
          - 最後の最後に、文字数を<p>文字数：0000字</p>の形式で報告してください。

          【最終チェック】
          - HTML本文のみを出力している。
          - [1]、[2]、[1][3]のようなサイテーション番号がない。
          - Markdown見出しやMarkdown表がない。
          - すべての段落が<p>タグになっている。
          - H2は指定した5個だけで、すべて「{product}」から始まっている。
          - 導入文は4つの<p>タグで、2つ目の悪い評判は1つだけである。
          - 基本スペック表、公式説明の要約、カラーリストがある。
          - 良かった点、悪かった点、使い方には、冒頭の総括リスト、短い解説、複数のH3本文がある。
          - 公式事実、第三者の評判、筆者の整理が読み分けられる。
          - 記事最後だけに文字数報告がある。
          """

          pathlib.Path(".codex-runtime/article-prompt.md").write_text(
              textwrap.dedent(prompt).strip() + "\n", encoding="utf-8"
          )
          PY

      - name: CodexでHTML記事を生成
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-runtime/article-prompt.md
          output-file: generated/article-raw.html
          sandbox: workspace-write
          safety-strategy: drop-sudo
          effort: high
          codex-args: '["-c", "web_search=\"live\"", "--ephemeral"]'

      - name: 出力を整形
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import html
          import os
          import pathlib
          import re

          slug = os.environ["ARTICLE_SLUG"]
          raw_path = pathlib.Path("generated/article-raw.html")
          if not raw_path.exists():
              raise SystemExit("Codexの出力ファイルが見つかりません。")

          text = raw_path.read_text(encoding="utf-8").replace("\r\n", "\n").strip()
          lines = text.splitlines()

          # 全文がHTMLコードフェンスで囲まれた場合だけ、安全に除去する。
          if len(lines) >= 2 and lines[0].strip().startswith("```") and lines[-1].strip() == "```":
              lines = lines[1:-1]
              text = "\n".join(lines).strip()

          # 念のため本文内の脚注番号風サイテーションを削除する。
          text = re.sub(r"\[(?:\d+)(?:\]\[\d+)*\]", "", text)

          # Codexが出した文字数行をいったん削除し、実測値で付け直す。
          text = re.sub(r"\s*<p>\s*文字数\s*[：:]\s*[\d,０-９，]+\s*字\s*</p>\s*$", "", text, flags=re.IGNORECASE)

          plain = re.sub(r"<[^>]+>", "", text)
          plain = html.unescape(plain)
          plain = re.sub(r"\s+", "", plain)
          char_count = len(plain)

          output = pathlib.Path("generated") / f"{slug}.html"
          output.write_text(text.strip() + f"\n\n<p>文字数：{char_count}字</p>\n", encoding="utf-8")
          PY

      - name: HTML記事構成を自動検査
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import pathlib
          import re

          product = os.environ["PRODUCT_NAME"].strip()
          slug = os.environ["ARTICLE_SLUG"].strip()
          path = pathlib.Path("generated") / f"{slug}.html"
          text = path.read_text(encoding="utf-8")
          errors = []

          if len(text.strip()) < 2500:
              errors.append("記事本文が短すぎます（2,500文字未満）。")

          if "```" in text:
              errors.append("コードフェンスが残っています。")

          if re.search(r"\[(?:\d+)(?:\]\[\d+)*\]", text):
              errors.append("[1] や [1][3] のようなサイテーション番号が残っています。")

          if re.search(r"^\s{0,3}#{1,6}\s+", text, flags=re.MULTILINE):
              errors.append("Markdown見出しが含まれています。HTMLの<h2><h3>を使ってください。")

          if re.search(r"^\|[^\n]+\|$", text, flags=re.MULTILINE):
              errors.append("Markdown表が含まれています。HTMLの<table>を使ってください。")

          if re.search(r"<\s*(html|body|head|title)\b", text, flags=re.IGNORECASE):
              errors.append("html/body/head/titleタグは不要です。本文HTMLだけにしてください。")

          for tag in ["<p", "<h2", "<h3", "<table"]:
              if not re.search(tag, text, flags=re.IGNORECASE):
                  errors.append(f"{tag}> タグが見つかりません。")

          required_h2 = [
              f"{product}とは？基本スペック",
              f"{product}のインプレ：良かった点",
              f"{product}のインプレ：悪かった点",
              f"{product}の使い方",
              f"{product}のインプレまとめ",
          ]
          h2_texts = re.findall(r"<h2[^>]*>\s*(.*?)\s*</h2>", text, flags=re.IGNORECASE | re.DOTALL)
          h2_texts = [re.sub(r"<[^>]+>", "", h).strip() for h in h2_texts]

          if h2_texts != required_h2:
              errors.append("H2の数・表記・順序が指定と一致しません。")

          first_h2 = re.search(r"<h2\b", text, flags=re.IGNORECASE)
          intro = text[:first_h2.start()] if first_h2 else ""
          intro_ps = re.findall(r"<p[^>]*>\s*(.*?)\s*</p>", intro, flags=re.IGNORECASE | re.DOTALL)
          intro_ps = [re.sub(r"<[^>]+>", "", p).strip() for p in intro_ps if re.sub(r"<[^>]+>", "", p).strip()]

          if len(intro_ps) != 4:
              errors.append("導入文が4つの<p>タグになっていません。")
          else:
              if not intro_ps[0].endswith(f"「{product}」"):
                  errors.append("導入文1段落目の末尾が商品名になっていません。")
              if not re.search(r"\d+(?:\.\d+)?\s*(?:mm|cm)", intro_ps[0], flags=re.IGNORECASE):
                  errors.append("導入文1段落目に全長（mmまたはcm）がありません。")
              if not re.search(r"\d+(?:\.\d+)?\s*g", intro_ps[0], flags=re.IGNORECASE):
                  errors.append("導入文1段落目に重量（g）がありません。")
              if not re.fullmatch(r"「[^「」]+」という評判は本当なのでしょうか？", intro_ps[1]):
                  errors.append("導入文2段落目が『悪い評判を1つだけ』の形式になっていません。")
              expected_3 = f"この記事では「{product}」の良かった・悪かったインプレを徹底解説します。"
              expected_4 = f"「{product}」を購入しようか迷っている人の参考になれば幸いです。"
              if intro_ps[2] != expected_3:
                  errors.append("導入文3段落目が定型文と一致しません。")
              if intro_ps[3] != expected_4:
                  errors.append("導入文4段落目が定型文と一致しません。")

          if f"<h3>{product}のカラーラインナップ</h3>" not in text:
              errors.append("指定されたカラーラインナップのH3がありません。")

          def section(start_heading: str, end_heading: str | None) -> str:
              start_pattern = re.escape(f"<h2>{start_heading}</h2>")
              start_match = re.search(start_pattern, text, flags=re.IGNORECASE)
              if not start_match:
                  return ""
              start = start_match.end()
              if end_heading:
                  end_pattern = re.escape(f"<h2>{end_heading}</h2>")
                  end_match = re.search(end_pattern, text[start:], flags=re.IGNORECASE)
                  end = start + end_match.start() if end_match else len(text)
              else:
                  end = len(text)
              return text[start:end]

          checks = [
              (f"{product}のインプレ：良かった点", f"{product}のインプレ：悪かった点", 3, "良かった点"),
              (f"{product}のインプレ：悪かった点", f"{product}の使い方", 2, "悪かった点"),
              (f"{product}の使い方", f"{product}のインプレまとめ", 3, "使い方"),
          ]

          for start, end, minimum_h3, label in checks:
              body = section(start, end)
              h3_count = len(re.findall(r"<h3[^>]*>", body, flags=re.IGNORECASE))
              li_count = len(re.findall(r"<li\b", body, flags=re.IGNORECASE))
              if h3_count < minimum_h3:
                  errors.append(f"{label}のH3が不足しています（最低{minimum_h3}個）。")
              if li_count < minimum_h3:
                  errors.append(f"{label}冒頭の総括リストが不足しています。")

          if not re.search(r"<p>\s*文字数\s*：\s*\d+\s*字\s*</p>\s*$", text, flags=re.IGNORECASE):
              errors.append("記事最後に『<p>文字数：0000字</p>』がありません。")

          if "参考資料" in text or "参照資料" in text or "出典" in text:
              errors.append("参考資料・参照資料・出典一覧は出力しない設定です。")

          if errors:
              print("HTML記事の自動検査に失敗しました:")
              for error in errors:
                  print(f"- {error}")
              raise SystemExit(1)

          print(f"検査完了: {path}")
          PY

      - name: 生成HTML記事をArtifactとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lure-html-article-${{ inputs.article_slug }}
          path: |
            generated/${{ inputs.article_slug }}.html
            generated/article-raw.html
          if-no-files-found: warn
          retention-days: 30

  publish:
    name: HTML記事追加PRを作成
    needs: generate
    if: ${{ needs.generate.result == 'success' && inputs.create_pull_request }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    env:
      PRODUCT_NAME: ${{ inputs.product_name }}
      ARTICLE_SLUG: ${{ inputs.article_slug }}
      BASE_BRANCH: ${{ github.ref_name }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: 生成HTML記事をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: lure-html-article-${{ inputs.article_slug }}
          path: .article-artifact

      - name: HTML記事を配置してコミット
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          article_path="articles/${ARTICLE_SLUG}.html"
          branch_name="codex/html-article-${ARTICLE_SLUG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          mkdir -p articles
          cp ".article-artifact/${ARTICLE_SLUG}.html" "$article_path"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch_name"
          git add -- "$article_path"

          echo "article_path=$article_path" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "既存記事と差分がないため、PRは作成しません。" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m "Add ${PRODUCT_NAME} HTML article"
          git push --set-upstream origin "$branch_name"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Pull Requestを作成
        if: ${{ steps.commit.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ARTICLE_PATH: ${{ steps.commit.outputs.article_path }}
          BRANCH_NAME: ${{ steps.commit.outputs.branch_name }}
        shell: bash
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          ## 概要

          CodexでWeb調査し、指定テンプレートに沿って「${PRODUCT_NAME}」のHTML記事を生成しました。

          - 保存先: \`${ARTICLE_PATH}\`
          - WordPressブロックエディタ向けHTML形式です
          - 本文中の \`[1][3]\` 形式のサイテーション番号は削除しています
          - ワークフロー内のHTML構成検査を通過済みです

          公開前に、商品仕様、カラー名、価格、表現の妥当性を人の目でも確認してください。
          EOF

          pr_url="$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "Add ${PRODUCT_NAME} HTML article" \
            --body-file "$RUNNER_TEMP/pr-body.md")"

          {
            echo "## 作成結果"
            echo
            echo "- Pull Request: ${pr_url}"
            echo "- 記事: \`${ARTICLE_PATH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
